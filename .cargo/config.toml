# Cargo configuration
# This file can help configure cargo behavior

# Use Git CLI for network operations instead of libgit2
# This can help avoid Git index version compatibility issues
[net]
git-fetch-with-cli = true

# Build configuration
[build]
# Some build scripts use Git for version information.
# If they fail due to index version issues, you can try
# setting rustflags or other options here.

# Workspace-level lint/safety policy:
# Deny usage of `unsafe` globally during normal builds via RUSTFLAGS.
# If an individual crate requires `unsafe`, add a minimal crate-level
# exemption `#![allow(unsafe_code)]` with a short comment justifying it.
[env]
RUSTFLAGS = "-D unsafe-code"

[rust-analyzer]
cargo.features = []
