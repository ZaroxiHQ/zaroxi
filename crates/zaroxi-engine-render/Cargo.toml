[package]
name = "zaroxi-engine-render"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
anyhow = "1"
thiserror = "2"
wgpu = "29.0.3"
winit = { workspace = true }
pollster = "0.3"
log = "0.4"
raw-window-handle = "0.5"

# Low-level text rasterization (font rasterizer). We use fontdue to rasterize glyph bitmaps.
fontdue = "0.7"

# bytemuck for safe pod casts for vertex buffers
bytemuck = "1.13"

# Reference to app state so renderer can accept AppState for read-only rendering.
zaroxi-app = { path = "../zaroxi-app" }
