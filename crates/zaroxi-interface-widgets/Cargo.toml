[package]
name = "zaroxi-interface-widgets"
version = "0.1.0"
edition = "2024"
description = "Zaroxi cockpit UI widgets: vello Scene composition, taffy layout, typed themes."
license = "MIT"

[dependencies]
# Single theme source of truth: the authorable theme crate. Widgets consume its
# resolved `SemanticColors`; they never define colors. A future theme/extension
# system plugs in here by producing `SemanticColors`.
zaroxi-interface-theme = { path = "../zaroxi-interface-theme" }
zaroxi-domain-settings = { path = "../zaroxi-domain-settings" }
# Pure minimap rendering data model (structure-first projection + mapping math).
zaroxi-core-editor-minimap = { path = "../zaroxi-core-editor-minimap" }
# GPU vector scene composition + flex/grid layout.
vello = { workspace = true }
taffy = { workspace = true }

[features]
default = []

[lints]
workspace = true
