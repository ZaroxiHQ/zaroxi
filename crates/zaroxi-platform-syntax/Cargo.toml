[package]
name = "zaroxi-platform-syntax"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Language grammars and parser runtime (Tree-sitter integration)."
rust-version = "1.85"

[dependencies]
serde = { workspace = true }
thiserror = { workspace = true }
parking_lot = { workspace = true }
libloading = { workspace = true, optional = true }
tree-sitter = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
ropey = { workspace = true }
cc = { workspace = true }

[features]
# Optional dynamic loading for runtime plugins / grammars.
dynamic-loading = ["libloading"]
