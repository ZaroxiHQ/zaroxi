[package]
name = "zaroxi-application-workspace"
version = "0.1.0"
edition = "2024"
description = "zaroxi-application-workspace (auto-generated)"
license = "MIT"

[dependencies]
# Minimal workspace-aligned dependencies required for Phase 1.
anyhow = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
serde = { workspace = true }

# Domain and core ports this application orchestrator depends on.
zaroxi-domain-workspace = { path = "../zaroxi-domain-workspace" }
zaroxi-core-editor-buffer = { path = "../zaroxi-core-editor-buffer" }
zaroxi-domain-buffer = { path = "../zaroxi-domain-buffer" }
zaroxi-kernel-types = { path = "../zaroxi-kernel-types" }
# Workspace file storage port (storage adapters implement this).
zaroxi-core-workspace-files = { path = "../zaroxi-core-workspace-files" }

# Application command types (new narrow crate owning command DTOs)
zaroxi-application-command = { path = "../zaroxi-application-command" }

# Application AI port (used by orchestrator)
zaroxi-application-ai = { path = "../zaroxi-application-ai" }

# Core engine UI (ShellWorkContent, ContentView) for workspace content assembly.
zaroxi-core-engine-ui = { path = "../zaroxi-core-engine-ui" }

# NOTE: This application crate intentionally has no dependency on infrastructure
# adapter crates. Infrastructure adapters (e.g. zaroxi-infrastructure-memory,
# zaroxi-infrastructure-ai-mock) implement the application-defined ports and
# therefore depend on this crate — not the other way around. Integration tests
# that wire concrete infra adapters live at the composition root
# (apps/zaroxi-desktop-harness) so the adapter -> port direction stays one-way
# and no dependency cycle is introduced.
