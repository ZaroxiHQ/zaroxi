[package]
name = "zaroxi-interface-app"
version = "0.1.0"
edition = "2024"
publish = false
license = "MIT"
description = "Desktop/web app shell and orchestration: AppState, command dispatch, and view model facades."

[dependencies]
zaroxi-kernel-config = { path = "../zaroxi-kernel-config" }
zaroxi-workspace-files = { path = "../zaroxi-workspace-files" }
zaroxi-interface-editor = { path = "../zaroxi-interface-editor", optional = true }
zaroxi-domain-buffer = { path = "../zaroxi-domain-buffer", optional = true }
serde = { workspace = true }
log = "0.4"
zaroxi-interface-theme = { path = "../zaroxi-interface-theme" }
