[package]
name = "zaroxi-interface-app"
version = "0.1.0"
edition = "2024"
description = "zaroxi-interface-app (Phase 48 minimal)"
license = "MIT"

[dependencies]
# Engine-facing semantic input type (non-visual). Interface depends on core (downward).
zaroxi-core-engine-view = { workspace = true }

# Render crate dependency: expose the canonical ShellDrawPlan / ShellRenderTranscript
# types produced by the rendering subsystem so this application-facing crate can
# convert plans into tiny UI-facing view models.
zaroxi-core-engine-render = { workspace = true }

# NOTE: This crate intentionally does NOT depend on zaroxi-interface-desktop, in
# either [dependencies] or [dev-dependencies]. interface-app defines the lower,
# implementation-independent view-model contracts; interface-desktop is the
# implementation that depends on interface-app (contracts -> implementation).
# The cross-crate interop/translation tests that need both live in
# zaroxi-interface-desktop, which already depends on this crate. This keeps the
# two interface crates from mutually depending on each other.
