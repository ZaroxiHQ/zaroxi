[package]
name = "zaroxi-interface-desktop"
version = "0.1.0"
edition = "2024"
description = "Desktop UI shell glue (editor+gui surface)."
license = "MIT"

[dependencies]
# Workspace-owned pins (inherit features from workspace)
tokio = { workspace = true, features = ["full", "macros", "rt-multi-thread", "time"] }
winit = { workspace = true }
vello = { workspace = true }
wgpu = { workspace = true }
taffy = { workspace = true }
once_cell = { workspace = true }
minifb = "0.28.0"
pollster = "0.3"
rfd = "0.15"
bytemuck = "1.25.0"
# Text shaping & layout (Cosmic Text) — primary renderer for phase 15.
# Use workspace-declared cosmic-text via `{ workspace = true }`.
cosmic-text = { workspace = true }
# Use the workspace font loader crate rather than reading assets directly.
zaroxi-core-engine-font = { path = "../zaroxi-core-engine-font" }
# Theme crate: expose semantic color tokens to the interface desktop so it can
# construct RenderLayout colors compatible with the renderer.
zaroxi-interface-theme = { path = "../zaroxi-interface-theme" }

zaroxi-core-engine-clipboard = { path = "../zaroxi-core-engine-clipboard" }

# Local workspace crates
zaroxi-core-engine-window = { path = "../zaroxi-core-engine-window" }
zaroxi-core-engine-render-backend = { path = "../zaroxi-core-engine-render-backend" }

# Other local application/domain deps
serde = { workspace = true }
# Add log dependency so runtime tracing via `log::info!` works in this crate.
log = { workspace = true }
zaroxi-domain-buffer = { path = "../zaroxi-domain-buffer" }
zaroxi-domain-workspace = { path = "../zaroxi-domain-workspace" }
zaroxi-kernel-types = { path = "../zaroxi-kernel-types" }
zaroxi-application-workspace = { path = "../zaroxi-application-workspace" }
zaroxi-application-bootstrap = { path = "../zaroxi-application-bootstrap" }
zaroxi-application-editor = { path = "../zaroxi-application-editor" }
zaroxi-application-navigation = { path = "../zaroxi-application-navigation" }
zaroxi-application-ai = { path = "../zaroxi-application-ai" }
zaroxi-core-platform-terminal = { path = "../zaroxi-core-platform-terminal" }
zaroxi-core-editor-buffer = { path = "../zaroxi-core-editor-buffer" }
zaroxi-core-editor-rope = { path = "../zaroxi-core-editor-rope" }
zaroxi-core-editor-view = { path = "../zaroxi-core-editor-view" }
zaroxi-core-engine-render = { path = "../zaroxi-core-engine-render", features = ["full_renderer"] }
zaroxi-core-engine-scene = { path = "../zaroxi-core-engine-scene" }
zaroxi-core-engine-style = { path = "../zaroxi-core-engine-style" }
zaroxi-core-engine-view = { path = "../zaroxi-core-engine-view" }
zaroxi-core-engine-ui = { path = "../zaroxi-core-engine-ui" }
zaroxi-interface-app = { path = "../zaroxi-interface-app" }
zaroxi-kernel-math = { path = "../zaroxi-kernel-math" }
zaroxi-core-platform-lsp = { path = "../zaroxi-core-platform-lsp", optional = true }
# Syntax highlighting via tree-sitter for editor text coloring.
zaroxi-core-platform-syntax = { path = "../zaroxi-core-platform-syntax" }

[dev-dependencies]
uuid = { workspace = true }
chrono = { workspace = true }
zaroxi-application-ai = { path = "../zaroxi-application-ai" }
zaroxi-domain-workspace = { path = "../zaroxi-domain-workspace" }
zaroxi-core-engine-layout = { path = "../zaroxi-core-engine-layout" }

# Feature to opt-in building the native GPU shell binary. By default the GUI
# binary is not compiled during CI/test builds (avoids pulling in winit/pixels).
[features]
# Enable gui_window by default so `cargo run -p zaroxi-interface-desktop --bin gui_shell`
# opens the native window in developer/local runs. CI can opt-out by disabling default features.
default = ["gui_window"]

gpu_shell_bin = []
layout = []
use_core_lsp = ["zaroxi-core-platform-lsp"]
gui_window = []

# The gpu_shell binary is now an optional binary (feature gated at top-level).
[[bin]]
name = "gpu_shell"
path = "src/bin/gpu_shell.rs"
required-features = ["gpu_shell_bin"]

[lints]
workspace = true
