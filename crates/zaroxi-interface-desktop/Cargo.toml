[package]
name = "zaroxi-interface-desktop"
version = "0.1.0"
edition = "2024"
description = "Desktop UI shell glue (editor+gui surface)."
license = "MIT"

[dependencies]
serde = { workspace = true }
zaroxi-domain-buffer = { path = "../zaroxi-domain-buffer" }
zaroxi-kernel-types = { path = "../zaroxi-kernel-types" }
zaroxi-application-workspace = { path = "../zaroxi-application-workspace" }
zaroxi-core-editor-buffer = { path = "../zaroxi-core-editor-buffer" }
zaroxi-core-engine-render = { path = "../zaroxi-core-engine-render" }
zaroxi-core-engine-scene = { path = "../zaroxi-core-engine-scene" }
zaroxi-interface-app = { path = "../zaroxi-interface-app" }

# Minimal native window + pixel buffer dependencies for a thin GPU-backed shell.
# Kept intentionally small: winit for window/event loop, pixels for an RGBA framebuffer
# surface that's easy to draw into. No heavy GUI or widget frameworks are added.
winit = { version = "0.30.13", optional = true }
pixels = { version = "0.17.1", optional = true }
minifb = { version = "0.24.0", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
uuid = { workspace = true }
chrono = { workspace = true }

# Feature to opt-in building the native GPU shell binary. By default the GUI
# binary is not compiled during CI/test builds (avoids pulling in winit/pixels).
[features]
gpu_shell_bin = ["winit", "pixels", "minifb"]

# Make the gpu_shell binary conditional on the feature so it is only compiled
# when explicitly requested:
[[bin]]
name = "gpu_shell"
path = "src/bin/gpu_shell.rs"
required-features = ["gpu_shell_bin"]
