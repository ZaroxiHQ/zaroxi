[package]
name = "zaroxi-kernel-protocol"
version.workspace = true
edition = "2024"
license.workspace = true
description = "Kernel-level protocol definitions for Zaroxi (stable wire types). Exposes minimal, stable wire types for inter-crate communication."
authors = ["Zaroxi Team"]
repository = "https://github.com/zaroxi/zaroxi"
readme = "README.md"
rust-version = "1.85.0"

[lib]
name = "zaroxi_kernel_protocol"
path = "src/lib.rs"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }

[features]
default = []
