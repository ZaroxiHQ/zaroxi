[package]
name = "zaroxi-infrastructure-rpc"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "RPC transport adapters (JSON-RPC / protobuf) for server and client communication."

[lib]
name = "zaroxi_infrastructure_rpc"
path = "src/lib.rs"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }

[features]
default = []
