[package]
name = "zaroxi-engine-runtime"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
anyhow = "1"
winit = { workspace = true }
pollster = "0.3"
log = "0.4"
env_logger = "0.11"
zaroxi-engine-render = { path = "../zaroxi-engine-render" }
zaroxi-engine-input = { path = "../zaroxi-engine-input" }
# runtime needs to be able to access AppState (read-only during render).
zaroxi-app = { path = "../zaroxi-app" }
