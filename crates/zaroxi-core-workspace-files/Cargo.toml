# Migration note:
# - The mistaken nested crate `crates/zaroxi-core-workspace-files/zaroxi-workspace`
#   has been removed. Move the kernel-id-backed WorkspaceId implementation into
#   the flat crate `crates/zaroxi-core-workspace-files`.
# - Add the minimal workspace dependencies required for the new state.rs.
[package]
name = "zaroxi-core-workspace-files"
version = "0.1.0"
edition = "2024"
description = "Filesystem view and metadata for workspaces."
license = "MIT"

[dependencies]
# Core workspace files crate now depends on serde for (de)serializing state
# and on the canonical kernel id crate for UuidId.
serde = { workspace = true }
zaroxi-kernel-id = { workspace = true }
