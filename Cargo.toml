# Zaroxi workspace manifest — authoritative final architecture
# AUTO-GENERATED: Update scripts/migrate_zaroxi.py and re-run the migration.
# This manifest contains the exact, validated flat crates/ inventory and
# workspace-level shared dependency pins for consistent crate manifests.
#
# Architecture: flat crates/ layout, strict layer boundaries:
# interface -> application -> domain -> core -> kernel
# Edition: 2024, Version policy: 0.1.0 for newly created crates.
#
# CI: run `cargo metadata --workspace` to validate dependency graph and
# `cargo check -p <crate>` as part of the verification pipeline.

