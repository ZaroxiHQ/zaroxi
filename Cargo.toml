# Standard defaults for newly generated crates.
[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT"
# Projects using this workspace should pin dependencies individually.

# Workspace-level lints (requires supported cargo/rustc versions)
# Deny unsafe code at workspace level via workspace lints. `.cargo/config.toml`
# is kept as a minimal fallback for older CI/tooling that doesn't yet honor
# workspace-level lint inheritance.
#
# The canonical workspace lint configuration below is the authoritative policy:
[workspace.lints.rust]
unsafe_code = "forbid"

# Centralized workspace dependency ownership for the APPROVED STACK.
# Member crates that require these dependencies should use `{ workspace = true }`
# in their Cargo.toml and must NOT repeat versions or features (workspace pins win).
#
# NOTE: I intentionally centralize only the APPROVED STACK here (rendering, text,
# layout, parsing, async, and serde). Other broadly-used helpers were removed
# from the top-level pins so individual crates can opt-in as appropriate and to
# avoid accidental transitive version coupling.
[workspace.dependencies]
# Rendering & windowing
wgpu = "29.0.3"
vello = "0.9.0"
winit = "0.30.13"

# Layout & text
taffy = "0.10.1"
cosmic-text = "0.19.0"
ropey = "1.6.1"

# Parsing & language
tree-sitter = "0.26.8"
lsp-types = "0.97.0"

# Clipboard / accessibility / helper crates
arboard = "3.6.1"
accesskit = "0.5.0"
candle-core = "0.7.0"
cc = "1.0"
parking_lot = "0.12"
libloading = "0.9.0"
tempfile = "3.27.0"
memmap2 = "0.9.10"
memchr = "2"
anyhow = "1.0"
uuid = { version = "1.4", features = ["serde", "v4"] }
thiserror = "2.0.18"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
bytemuck = "1.25.0"
# Developer helpers used by a few crates (exposed at workspace root)
pollster = "0.3"
raw-window-handle = "0.6.2"
minifb = "0.28.0"
once_cell = "1.20.0"
