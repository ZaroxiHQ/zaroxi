# Standard defaults for newly generated crates.
[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT"
# Projects using this workspace should pin dependencies individually.

# Workspace-level recommended tooling (kept minimal and optional)
# Core workspace dependencies declared here so member crates may use
# `crate = { workspace = true }` style in their Cargo.toml. This prevents
# duplicated versions across the workspace and centralizes pinning.
#
# Add only broadly-used, stable dependencies here. Keep this list minimal;
# individual crates should declare crate-specific features/versions.
[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.4", features = ["serde", "v4"] }
thiserror = "2.0.18"
cc = "1.0"
parking_lot = "0.12"
libloading = "0.9.0"
ropey = "1.6.1"
tempfile = "3.27.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros"] }
tree-sitter = "0.26.8"

# Workspace metadata for CI and maintainers: enforce architecture rules programmatically
[workspace.metadata.zaroxi]
architecture = "flat-monolith"
layers = [
  "interface",
  "application",
  "domain",
  "core",
  "kernel",
  "infrastructure",
  "intelligence",
  "security",
]
naming_rules = """
All crate names must begin with one of:
- zaroxi-kernel-*
- zaroxi-core-*
- zaroxi-domain-*
- zaroxi-application-*
- zaroxi-intelligence-*
- zaroxi-infrastructure-*
- zaroxi-security-*
- zaroxi-interface-*
"""
dependency_rules = """
Allowed direction: interface -> application -> domain -> core -> kernel.
Infrastructure crates are adapters only and must not depend on application or interface.
Intelligence crates depend only on domain and core-shared where necessary.
Security crates must not depend on higher-level layers.
No circular or upward dependencies allowed.
"""

