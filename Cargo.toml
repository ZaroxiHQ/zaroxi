# Patch local overrides to ensure workspace crates that request
# `zaroxi-kernel-id = { workspace = true }` resolve to the local path
# during migration/testing runs. This avoids accidental crates.io lookup
# while the workspace pins are being adjusted incrementally.
[patch.crates-io]
zaroxi-kernel-id = { path = "crates/zaroxi-kernel-id" }

# If other workspace-wide helper pins are desired later (anyhow, thiserror, etc.),
# add them deliberately after review. For now keep the root manifest focused.

# Workspace metadata for CI and maintainers: enforce architecture rules programmatically
[workspace.metadata.zaroxi]
architecture = "flat-monolith"
layers = [
  "interface",
  "application",
  "domain",
  "core",
  "kernel",
  "infrastructure",
  "intelligence",
  "security",
]
naming_rules = """
All crate names must begin with one of:
- zaroxi-kernel-*
- zaroxi-core-*
- zaroxi-domain-*
- zaroxi-application-*
- zaroxi-intelligence-*
- zaroxi-infrastructure-*
- zaroxi-security-*
- zaroxi-interface-*
"""
dependency_rules = """
Allowed direction: interface -> application -> domain -> core -> kernel.
Infrastructure crates are adapters only and must not depend on application or interface.
Intelligence crates depend only on domain and core-shared where necessary.
Security crates must not depend on higher-level layers.
No circular or upward dependencies allowed.
"""

