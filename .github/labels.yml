# Canonical repository labels — synced by .github/workflows/labels.yml.
# These back the Release Drafter categories, autolabeler, version resolver and
# Dependabot. Edit here and the sync workflow reconciles the repo on push.

# ── Change types (drive release notes + version bump) ────────────────────────
- name: "breaking"
  color: "b60205"
  description: "Backwards-incompatible change (major bump)"
- name: "feature"
  color: "0e8a16"
  description: "New user-facing capability (minor bump)"
- name: "enhancement"
  color: "0e8a16"
  description: "Improvement to an existing capability"
- name: "fix"
  color: "d73a4a"
  description: "Bug fix (patch bump)"
- name: "bug"
  color: "d73a4a"
  description: "Confirmed defect"
- name: "performance"
  color: "fbca04"
  description: "Performance improvement"
- name: "refactor"
  color: "c5def5"
  description: "Internal change with no behavior change"
- name: "security"
  color: "b60205"
  description: "Security fix or hardening"
- name: "documentation"
  color: "0075ca"
  description: "Documentation only"
- name: "test"
  color: "bfd4f2"
  description: "Tests only"
- name: "ci"
  color: "1d76db"
  description: "CI/CD, build scripts, or tooling"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates"
- name: "chore"
  color: "ededed"
  description: "Routine maintenance"

# ── Version-bump overrides (optional manual control) ─────────────────────────
- name: "major"
  color: "b60205"
  description: "Force a major version bump"
- name: "minor"
  color: "0e8a16"
  description: "Force a minor version bump"
- name: "patch"
  color: "c2e0c6"
  description: "Force a patch version bump"

# ── Ecosystem tags (Dependabot) ──────────────────────────────────────────────
- name: "rust"
  color: "dea584"
  description: "Rust / Cargo"
- name: "github-actions"
  color: "2088ff"
  description: "GitHub Actions workflows"

# ── Housekeeping ─────────────────────────────────────────────────────────────
- name: "skip-changelog"
  color: "ededed"
  description: "Exclude this PR from the release notes"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already reported / already exists"
- name: "invalid"
  color: "e4e669"
  description: "Not valid / not reproducible"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is welcome"
