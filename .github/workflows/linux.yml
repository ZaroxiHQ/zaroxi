name: Linux

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-test:
    name: fmt + clippy + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Native windowing/graphics dependencies for the pure-Rust stack
      # (winit + wgpu + wayland/x11 + xkbcommon). This project does NOT use
      # Tauri/GTK/WebKit — only the Rust rendering stack.
      - name: Install Linux windowing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      # Tree-sitter grammars for linux-x86_64 are committed, so this is a fast
      # no-op here; it stays for parity with the other OS jobs and self-heals if
      # a grammar is missing. It also exports ZAROXI_TREESITTER_RUNTIME_DIR.
      - name: Prepare Tree-sitter grammars
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Test
        run: cargo test --workspace

  package-release:
    name: Package Linux release artifacts
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # `fuse` + `libfuse2` are required for AppImage tooling to mount/extract
      # the runtime; the windowing libs mirror the build-test job.
      - name: Install Linux windowing + packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev \
            libwayland-dev \
            fuse \
            libfuse2

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-cargo-

      - name: Prepare Tree-sitter grammars
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Build release binary
        run: cargo build --release -p zaroxi-interface-desktop --bin gui_shell

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install cargo-appimage
        run: cargo install cargo-appimage --locked

      - name: Build AppImage
        run: |
          cargo appimage -p zaroxi-interface-desktop --bin gui_shell
          find . -name "*.AppImage" -exec mv {} \
            ZaroxiStudio-${{ steps.version.outputs.version }}-x86_64.AppImage \;

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb package
        run: |
          cargo deb -p zaroxi-interface-desktop \
            --output ZaroxiStudio-${{ steps.version.outputs.version }}-amd64.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-artifacts
          path: |
            ZaroxiStudio-*.AppImage
            ZaroxiStudio-*.deb
          if-no-files-found: error
