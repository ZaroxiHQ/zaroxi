name: macOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-test:
    name: fmt + clippy + build + test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      # Grammars are committed for linux only; build the macOS (.dylib) grammars
      # here (uses git + the system C compiler/clang) before the syntax tests.
      - name: Prepare Tree-sitter grammars
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Test
        run: cargo test --workspace

  package-release:
    name: Package macOS release artifacts
    runs-on: macos-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain with target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-${{ matrix.target }}-cargo-

      - name: Prepare Tree-sitter grammars
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p zaroxi-interface-desktop --bin gui_shell

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Bundle .app
        run: cargo bundle --release --target ${{ matrix.target }} -p zaroxi-interface-desktop

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/osx/Zaroxi Studio.app"
          ARCH_LABEL=$(echo "${{ matrix.target }}" | grep -q aarch64 && echo "arm64" || echo "x86_64")
          create-dmg \
            --volname "Zaroxi Studio" \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 200 \
            "ZaroxiStudio-${{ steps.version.outputs.version }}-${ARCH_LABEL}.dmg" \
            "$APP_PATH" || true
          # create-dmg returns non-zero on some benign warnings; verify file exists
          test -f "ZaroxiStudio-${{ steps.version.outputs.version }}-${ARCH_LABEL}.dmg"

      - name: Build .pkg installer
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/osx/Zaroxi Studio.app"
          ARCH_LABEL=$(echo "${{ matrix.target }}" | grep -q aarch64 && echo "arm64" || echo "x86_64")
          pkgbuild \
            --install-location /Applications \
            --component "$APP_PATH" \
            "ZaroxiStudio-${{ steps.version.outputs.version }}-${ARCH_LABEL}.pkg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-artifacts-${{ matrix.target }}
          path: |
            ZaroxiStudio-*.dmg
            ZaroxiStudio-*.pkg
          if-no-files-found: error
