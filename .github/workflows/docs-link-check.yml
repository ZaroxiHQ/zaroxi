name: Docs Link Check

on:
  push:
    paths:
      - 'docs/**'
      - '.github/**'
      - 'README.md'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/**'
      - 'README.md'

jobs:
  link-check:
    name: Validate internal Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # markdown-link-check is invoked via a PINNED version (not a floating
      # `npm install -g` latest). Versions >= 3.12 pull an ESM-only `marked`
      # through markdown-link-extractor and crash with ERR_REQUIRE_ESM; 3.11.2
      # uses the CommonJS chain and runs reliably on the Node runtime above.
      - name: Run link checks (internal links only; external URLs skipped)
        run: |
          set -uo pipefail
          # All markdown under docs/ plus the top-level README.
          files=$(find docs -name '*.md' -print; echo README.md)
          config=.github/markdown-link-check.json
          status=0
          for f in $files; do
            echo "::group::Checking $f"
            if ! npx --yes markdown-link-check@3.11.2 -c "$config" "$f"; then
              status=1
            fi
            echo "::endgroup::"
          done
          exit "$status"
