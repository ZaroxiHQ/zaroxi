name: Windows

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-test:
    name: fmt + clippy + build + test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      # Grammars are committed for linux only; build the Windows (.dll) grammars
      # here before the syntax tests. Runs the shared bash script under the
      # pre-installed Git Bash (no PowerShell port needed).
      - name: Prepare Tree-sitter grammars
        shell: bash
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Test
        run: cargo test --workspace

  package-release:
    name: Package Windows release artifacts
    runs-on: windows-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-cargo-

      - name: Prepare Tree-sitter grammars
        shell: bash
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Build release binary
        run: cargo build --release -p zaroxi-interface-desktop --bin gui_shell

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $v = "${env:GITHUB_REF_NAME}" -replace '^v',''
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build MSI installer
        run: cargo wix -p zaroxi-interface-desktop --nocapture

      - name: Rename MSI with version
        shell: pwsh
        run: |
          Get-ChildItem -Path target/wix -Filter *.msi | ForEach-Object {
            Rename-Item $_.FullName "ZaroxiStudio-${{ steps.version.outputs.version }}-x64.msi"
          }
          Move-Item target/wix/ZaroxiStudio-*.msi .

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-artifacts
          path: ZaroxiStudio-*.msi
          if-no-files-found: error
