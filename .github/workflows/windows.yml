name: Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-test:
    name: build + test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + build output
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace

      # Grammars are committed for linux only; build the Windows (.dll) grammars
      # here before the syntax tests. Uses Git Bash + a C toolchain.
      - name: Prepare Tree-sitter grammars
        shell: bash
        run: bash tooling/scripts/prepare-treesitter.sh

      - name: Test
        run: cargo test --workspace
