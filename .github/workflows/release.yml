name: Release

# Single owner of the published GitHub Release for a version tag.
#
# Flow when a `v*` tag is pushed:
#   1. linux.yml / macos.yml / windows.yml each run their `Package … release
#      artifacts` job (gated on the same tag) and upload OS artifacts.
#   2. This workflow waits for all of those package jobs to succeed, downloads
#      every artifact, and attaches them to the release for the tag.
#
# Reconciliation with Release Drafter (release-drafter.yml):
#   Release Drafter maintains a DRAFT release tagged `v$RESOLVED_VERSION` with
#   curated, categorized notes assembled from merged PRs. This workflow does
#   NOT regenerate notes (no `generate_release_notes`, no `body`) so that when
#   `softprops/action-gh-release` updates the release matching the pushed tag,
#   the drafter-authored notes are preserved. Net effect: Drafter owns the
#   NOTES, this workflow owns the ARTIFACTS and the release object — a single
#   draft per tag, no duplicates.
#
# The release stays a draft; review it and publish manually. Publishing fires
# `release: published`, which drives changelog.yml.

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  wait-for-builds:
    name: Wait for platform builds to complete
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Linux package job
        uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Package Linux release artifacts'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      # macOS packages via a target matrix, so its check names are suffixed
      # (e.g. "Package macOS release artifacts (aarch64-apple-darwin)"). A plain
      # check-name can never match those, so wait on all legs by regexp.
      - name: Wait for macOS package jobs (all matrix legs)
        uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.ref }}
          check-regexp: 'Package macOS release artifacts.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      - name: Wait for Windows package job
        uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Package Windows release artifacts'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

  publish-release:
    name: Attach all artifacts to the release
    runs-on: ubuntu-latest
    needs: wait-for-builds
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: '*-release-artifacts*'
          merge-multiple: true

      - name: List downloaded files
        run: find dist -type f

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create or update Release (artifacts only; notes owned by Drafter)
        uses: softprops/action-gh-release@v3
        with:
          name: "Zaroxi Studio ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          # Intentionally NO generate_release_notes/body: keep the Release
          # Drafter draft's curated notes intact when updating this tag's draft.
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.pkg
            dist/*.msi
