name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Basic Rust checks (compile / clippy / test / fmt / deny)
  check:
    name: check+clippy+test+fmt+deny
    runs-on: ubuntu-latest
    strategy:
      matrix:
        step: [check, clippy, test, fmt, deny]
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Install rust toolchain
        uses: actions/setup-python@v4
        # Dummy to satisfy matrix; real toolchain installed conditionally below

      - name: Install Rust (stable) and components
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Run step
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.step }}" in
            check)
              cargo check --workspace --all-targets
              ;;
            clippy)
              cargo clippy --workspace --all-targets -- -D warnings
              ;;
            test)
              cargo test --workspace
              ;;
            fmt)
              cargo fmt --all -- --check
              ;;
            deny)
              cargo install cargo-deny --locked
              cargo deny check
              ;;
            *)
              echo "Unknown step"
              exit 1
              ;;
          esac

  # Layer dependency checker: run report and upload JSON artifact
  layer-deps:
    name: Layer Dependency Checker
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Run layer dependency checker (generate report)
        run: |
          python3 .github/scripts/check_layer_deps.py --report layer-deps-report.json || echo "layer deps returned non-zero"
      - name: Upload layer-deps report
        uses: actions/upload-artifact@v4
        with:
          name: layer-deps-report
          path: layer-deps-report.json

  # Naming convention checker
  naming-convention:
    name: Crate Naming Conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Run naming check
        run: python3 .github/scripts/check_crate_naming.py

  # Circular dependency detection
  circular-deps:
    name: Circular Dependency Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Run circular dependency check
        run: python3 .github/scripts/check_circular_deps.py

  # Crate size analysis
  crate-size:
    name: Crate Size Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Run crate size check
        id: size_check
        run: |
          python3 .github/scripts/check_crate_size.py | tee crate-size-output.txt
          echo "size_output<<EOF" >> $GITHUB_OUTPUT
          cat crate-size-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Post PR comment with size summary (if pull_request)
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = process.env['GITHUB_OUTPUT'];
            // GITHUB_OUTPUT contains the appended content; read via env in actions (we used $GITHUB_OUTPUT)
            // Instead, read the artifact file from workspace
            const fs = require('fs');
            const txt = fs.readFileSync('crate-size-output.txt', 'utf8');
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: "Crate size analysis:\\n\\n```\n" + txt + "\n```"
            });

  # Note for maintainers: Protect main branch via branch protection rules in GitHub settings:
  # Require status checks: check (all matrix steps), layer-deps, naming-convention, circular-deps, crate-size
  # Also require PR reviews and up-to-date branches before merging.
