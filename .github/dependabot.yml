version: 2

updates:
  # Rust / Cargo dependencies for the whole workspace.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    # Batch routine minor/patch bumps into a single PR to reduce noise; keep
    # major bumps as individual PRs so they can be reviewed/migrated on their own.
    groups:
      cargo-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions used by the workflows up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions-all:
        patterns:
          - "*"
