# cargo-deny configuration for the Zaroxi workspace
# See: https://embark.dev/cargo-deny/ for details.
#
# This file enforces:
# - Advisory checks (known vulnerabilities / unmaintained crates fail CI)
# - License allowlist (only permissive licenses are permitted)
# - Duplicate-version detection (deny)
#
# NOTE: uses the cargo-deny v2 config schema (top-level `[advisories]`,
# `[licenses]`, `[bans]` tables). If cargo-deny changes its config format,
# adapt this file accordingly.

# ── Security advisories ─────────────────────────────────────────────────────
# With `version = 2`, vulnerabilities and unmaintained advisories fail by
# default; add IDs to `ignore` only with a documented rationale.
#
# TEMPORARY, JUSTIFIED IGNORES — kept in sync with `.cargo/audit.toml`.
# All entries are transitive, build-time-only dependencies with no reachable
# runtime attack surface. There is currently NO upstream release that fixes
# them (verified: the highest quick-xml requirement across every published
# wayland-scanner version is ^0.39). Remove each entry the moment the
# corresponding upstream crate ships a fixed release.
[advisories]
version = 2
ignore = [
  # quick-xml < 0.41.0 (RUSTSEC-2026-0194 quadratic attr scan,
  # RUSTSEC-2026-0195 unbounded namespace alloc). Reached ONLY via
  # winit 0.30.13 → smithay-client-toolkit 0.19.2 → wayland-scanner 0.31.10,
  # which pins quick-xml = "^0.39". wayland-scanner has never released a version
  # using quick-xml >= 0.40, so no dependency bump can resolve this today.
  # The parsing runs at BUILD time over trusted, bundled wayland-protocol XML
  # (no attacker-controlled input) so the DoS is not reachable at runtime.
  # UPGRADE PATH: bump winit once smithay/wayland-scanner ship quick-xml >= 0.41.
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
  # `instant` 0.1.13 unmaintained (RUSTSEC-2024-0384) — transitive via
  # wgpu 29.0.3. Drops out when wgpu is upgraded (it has moved to `web-time`).
  "RUSTSEC-2024-0384",
  # `ttf-parser` 0.25.1 unmaintained (RUSTSEC-2026-0192) — transitive via
  # fontdb → cosmic-text 0.19.0. Drops out when cosmic-text refreshes it.
  "RUSTSEC-2026-0192",
]

# ── License policy ──────────────────────────────────────────────────────────
# Pure allowlist model: any crate whose license is not listed here fails the
# check, so copyleft licenses (GPL/AGPL/…) are rejected implicitly.
[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0", # modern successor used by unicode-ident (permissive)
  "BSL-1.0",     # Boost Software License — permissive (e.g. ryu, xml-rs deps)
  "Zlib",        # zlib/libpng license — permissive (e.g. foldhash, slotmap)
  "CC0-1.0",     # public-domain dedication — permissive (e.g. notify/hashbrown deps)
]
confidence-threshold = 0.8
exceptions = []

# ── Bans / duplicate detection ──────────────────────────────────────────────
# Duplicate versions are reported as warnings rather than hard errors.
#
# Rationale: the native GUI/rendering stack (winit 0.30 / wgpu 29 / vello 0.9 /
# the wayland-* and windows-* families) structurally pulls in multiple versions
# of ~30 low-level crates (bitflags, hashbrown, windows-sys, wayland-scanner,
# rustix, objc2-*, …). These duplicates originate entirely from third-party
# transitive graphs we do not control and cannot be deduplicated without forking
# upstream crates. Keeping this as "deny" would fail CI on a purely structural,
# non-actionable condition. "warn" keeps the duplicates visible in the report
# (so genuine, fixable duplicates among *our* direct deps still surface) without
# blocking the pipeline. Revisit toward "deny" after a future winit/wgpu refresh.
#
# Layer enforcement note: cargo-deny cannot express "crate X may only be
# depended on by layer Y" via a package ban (wildcard crate names are not
# supported in `deny` entries). The authoritative kernel/core layer-graph check
# lives in .github/scripts/check_layer_deps.py.
[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

# ── Sources ─────────────────────────────────────────────────────────────────
# Only crates.io and explicitly-allowed git sources are permitted.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
