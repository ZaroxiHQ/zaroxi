# ------------------------------------------------------------
# Aider Configuration — Zaroxi Monorepo (140+ crates)
# Optimized for small-context models (o3-mini / DeepSeek)
# Clean commits, no prefixes, token-efficient
# ------------------------------------------------------------

# --- Token / repo map control ---
map-tokens: 1024
map-refresh: auto
map-multiplier-no-files: 1

# --- Prompt efficiency ---
cache-prompts: true
cache-keepalive-pings: 30

# --- Git automation ---
auto-commits: true
dirty-commits: false
attribute-author: false
attribute-committer: false
attribute-commit-message-author: false
attribute-commit-message-committer: false

# No forced commit prefix → natural commit messages
# (Aider will generate normal messages based on diffs)

# --- Output / UX ---
pretty: true
stream: true
show-diffs: true

# --- Repo safety ---
gitignore: true
subtree-only: false

# --- Context safety ---
max-chat-history-tokens: 2048

# --- Iteration speed ---
auto-lint: false
auto-test: false

# --- Large repo optimization ---
watch-files: false